c<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <style>
    /* Design system: NASA branding */
    :root {
      --bg: #000000;
      --fg: #FFFFFF;
      --nasa-red: #FC3D21;
      --nasa-blue: #0B3D91;
      --muted: #BFBFBF;
      --border: #FFFFFF;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    /* Accessibility: screen-reader-only labels */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* Accessibility: visible focus states */
    :focus-visible {
      outline: 2px solid var(--nasa-red);
      outline-offset: 2px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Layout: header row */
    header.site-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 2px solid var(--nasa-red);
      flex-wrap: wrap;
    }

    .logo {
      color: var(--nasa-red);
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 4px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 400;
      color: var(--fg);
      flex: 1 1 auto;
    }

    /* Layout: right-aligned controls */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .controls input[type="date"] {
      background: #000;
      color: var(--fg);
      border: 1px solid var(--fg);
      padding: 8px 10px;
      font: inherit;
      border-radius: 2px;
    }

    .controls button {
      background: var(--nasa-blue);
      color: var(--fg);
      border: 1px solid var(--nasa-blue);
      padding: 8px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      border-radius: 2px;
    }

    .controls button:hover {
      background: var(--nasa-red);
      border-color: var(--nasa-red);
    }

    /* Bonus: Did You Know? fact section */
    .fact {
      border: 1px solid var(--nasa-blue);
      padding: 12px;
      margin: 16px 0;
      border-radius: 2px;
      display: block;
      color: var(--fg);
    }
    .fact-icon { color: var(--nasa-red); margin-right: 8px; }
    .fact-label { font-weight: 700; margin-right: 6px; }

    /* Loading message */
    #status {
      padding: 16px 0;
      min-height: 1em;
      color: var(--fg);
    }

    /* Gallery grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      padding: 16px 0;
    }

    /* Cards */
    .card {
      background: transparent;
      color: inherit;
      border: 1px solid var(--fg);
      padding: 0;
      text-align: left;
      font: inherit;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      border-radius: 2px;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--nasa-red);
    }

    .card .thumb-wrap {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #111;
      overflow: hidden;
    }

    .card .thumb-wrap > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1);
      transform-origin: center center;
      transition: transform 0.3s ease;
    }

    /* Bonus: hover zoom */
    .card:hover .thumb-wrap > img,
    .card:focus-visible .thumb-wrap > img {
      transform: scale(1.05);
    }

    /* Video badge for media_type=video */
    .badge-video {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--nasa-blue);
      color: var(--fg);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 2px;
    }

    .card .meta {
      display: block;
      padding: 10px 12px;
      border-top: 1px solid var(--fg);
    }

    .card .meta .title {
      display: block;
      width: 100%;
      color: var(--nasa-red);
      font-weight: 700;
      font-size: 18px;
      margin: 0 0 4px 0;
    }

    .card .meta time {
      display: block;
      width: 100%;
      color: var(--muted);
      font-size: 14px;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal.open { display: flex; }

    .modal-content {
      background: #000;
      border: 2px solid var(--nasa-red);
      max-width: 960px;
      width: 100%;
      max-height: 90vh;
      overflow: auto;
      position: relative;
      border-radius: 2px;
    }

    .modal-close {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--nasa-blue);
      color: var(--fg);
      border: 1px solid var(--nasa-blue);
      width: 36px;
      height: 36px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 2px;
    }

    .modal-close:hover {
      background: var(--nasa-red);
      border-color: var(--nasa-red);
    }

    .modal-media img,
    .modal-media iframe {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      display: block;
      background: #000;
      border: 0;
      aspect-ratio: 16 / 9;
    }

    .modal-body {
      padding: 16px 20px 20px;
    }

    .modal-title {
      color: var(--nasa-red);
      margin: 0 0 4px 0;
      font-size: 22px;
    }

    .modal-date {
      color: var(--muted);
      font-size: 14px;
      display: block;
      margin-bottom: 12px;
    }

    .modal-explanation {
      color: var(--fg);
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .modal-link {
      color: var(--nasa-red);
      display: inline-block;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Rubric: NASA branding + header layout -->
    <header class="site-header">
      <span class="logo" aria-label="NASA">NASA</span>
      <h1>Space Explorer</h1>
      <div class="controls" role="group" aria-label="Date range controls">
        <label for="startDate" class="sr-only">Start date</label>
        <input type="date" id="startDate" />
        <label for="endDate" class="sr-only">End date</label>
        <input type="date" id="endDate" />
        <button id="loadBtn" type="button">Get Space Images</button>
      </div>
    </header>

    <!-- Bonus: Did You Know? random fact -->
    <section class="fact" id="fact" aria-label="Space fact">
      <span class="fact-icon" aria-hidden="true">💫</span>
      <span class="fact-label">Did You Know?</span>
      <span id="factText"></span>
    </section>

    <!-- Rubric: loading message / status -->
    <div id="status" role="status" aria-live="polite"></div>

    <!-- Rubric: gallery of 9 cards -->
    <section id="gallery" class="gallery" aria-label="APOD gallery"></section>
  </div>

  <!-- Rubric: modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close dialog">&#x2715;</button>
      <div class="modal-media" id="modalMedia"></div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <time class="modal-date" id="modalDate"></time>
        <p class="modal-explanation" id="modalExplanation"></p>
      </div>
    </div>
  </div>

  <script>
    // Rubric: swappable API key
    const API_KEY = "7kfFMkAKVaeoddAcy2c5nNcceUgqNsrZI3HKbT4M";
    const APOD_MIN = "1995-06-16";

    // Bonus: space facts pool
    const FACTS = [
      "A day on Venus is longer than its year — it rotates once every 243 Earth days but orbits the Sun every 225.",
      "Neutron stars are so dense a sugar-cube-sized amount would weigh about a billion tons on Earth.",
      "The footprints left by Apollo astronauts on the Moon will likely remain for millions of years — there is no wind to erase them.",
      "Jupiter's Great Red Spot is a storm that has raged for at least 350 years and is wider than Earth.",
      "Saturn's rings are mostly water ice and are less than 30 meters thick in many places.",
      "Light from the Sun takes about 8 minutes and 20 seconds to reach Earth.",
      "There are more stars in the observable universe than grains of sand on all of Earth's beaches.",
      "Olympus Mons on Mars is the largest volcano in the solar system — nearly three times the height of Mount Everest.",
      "A year on Mercury is just 88 Earth days, but a single day there lasts 176 Earth days.",
      "The Milky Way and Andromeda galaxies are on a collision course and will merge in about 4.5 billion years."
    ];

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const galleryEl = $("gallery");
    const startInput = $("startDate");
    const endInput = $("endDate");
    const loadBtn = $("loadBtn");
    const modal = $("modal");
    const modalMedia = $("modalMedia");
    const modalTitle = $("modalTitle");
    const modalDate = $("modalDate");
    const modalExplanation = $("modalExplanation");
    const modalClose = $("modalClose");
    const factText = $("factText");

    // Bonus: pick a random fact on each load
    function pickFact() {
      const i = Math.floor(Math.random() * FACTS.length);
      factText.textContent = FACTS[i];
      console.log("pickFact ran:", FACTS[i]);
    }

    // Rubric: escape HTML from API responses
    function esc(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function fmtDate(iso) {
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
    }

    function toISO(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    // Rubric: defensive video handling — extract YouTube ID
    function ytId(url) {
      if (!url) return null;
      const patterns = [
        /youtu\.be\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/,
        /youtube\.com\/watch\?[^#]*v=([A-Za-z0-9_-]{6,})/,
        /youtube-nocookie\.com\/embed\/([A-Za-z0-9_-]{6,})/
      ];
      for (const re of patterns) {
        const m = url.match(re);
        if (m) return m[1];
      }
      return null;
    }

    function ytThumb(id) {
      return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    }

    // Rubric: default 9-day range ending today, min/max bounds
    function initDates() {
      const today = new Date();
      const end = toISO(today);
      const startDate = new Date(today);
      startDate.setDate(startDate.getDate() - 8);
      const start = toISO(startDate);

      startInput.min = APOD_MIN;
      startInput.max = end;
      endInput.min = APOD_MIN;
      endInput.max = end;
      startInput.value = start;
      endInput.value = end;
    }

    // Rubric: fetch APOD data for the selected range
    async function loadImages() {
      const start = startInput.value;
      const end = endInput.value;
      if (!start || !end) {
        statusEl.textContent = "Please select both a start and end date.";
        return;
      }
      if (start > end) {
        statusEl.textContent = "Start date must be on or before end date.";
        return;
      }

      statusEl.textContent = "🔄 Loading space photos…";
      galleryEl.innerHTML = "";

      const url = `https://api.nasa.gov/planetary/apod?api_key=${encodeURIComponent(API_KEY)}&start_date=${start}&end_date=${end}`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const items = Array.isArray(data) ? data : [data];
        items.sort((a, b) => b.date.localeCompare(a.date));
        renderGallery(items);
        statusEl.textContent = "";
      } catch (err) {
        statusEl.textContent = `Could not load images: ${esc(err.message)}`;
      }
    }

    // Rubric: render 9 cards (image/title/date), defensive video handling
    function renderGallery(items) {
      galleryEl.innerHTML = "";
      items.forEach((item) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "card";
        card.setAttribute("aria-label", `Open ${item.title}`);

        let thumbSrc = "";
        let isVideo = item.media_type === "video";
        let altText = item.title || "APOD image";

        if (isVideo) {
          const id = ytId(item.url);
          thumbSrc = id ? ytThumb(id) : (item.thumbnail_url || "");
        } else {
          thumbSrc = item.url || item.hdurl || "";
        }

        card.innerHTML = `
          <span class="thumb-wrap">
            ${thumbSrc ? `<img src="${esc(thumbSrc)}" alt="${esc(altText)}" loading="lazy" />` : ""}
            ${isVideo ? `<span class="badge-video">VIDEO</span>` : ""}
          </span>
          <span class="meta">
            <span class="title">${esc(item.title || "")}</span>
            <time datetime="${esc(item.date)}">${esc(fmtDate(item.date))}</time>
          </span>
        `;

        card.addEventListener("click", () => openModal(item));
        galleryEl.appendChild(card);
      });
    }

    // Rubric: modal open/close
    let lastFocused = null;

    function openModal(item) {
      lastFocused = document.activeElement;
      modalTitle.textContent = item.title || "";
      modalDate.setAttribute("datetime", item.date || "");
      modalDate.textContent = fmtDate(item.date);
      modalExplanation.textContent = item.explanation || "";
      modalMedia.innerHTML = "";

      if (item.media_type === "video") {
        const id = ytId(item.url);
        if (id) {
          const iframe = document.createElement("iframe");
          iframe.src = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}`;
          iframe.title = item.title || "APOD video";
          iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
          iframe.allowFullscreen = true;
          modalMedia.appendChild(iframe);
        } else {
          const link = document.createElement("a");
          link.href = item.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.className = "modal-link";
          link.textContent = `Open video: ${item.url}`;
          modalMedia.appendChild(link);
        }
      } else {
        const img = document.createElement("img");
        img.src = item.hdurl || item.url || "";
        img.alt = item.title || "APOD image";
        modalMedia.appendChild(img);
      }

      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      modalClose.focus();
    }

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      modalMedia.innerHTML = "";
      if (lastFocused && lastFocused.focus) lastFocused.focus();
    }

    // Rubric: close via ✕, backdrop, Escape
    modalClose.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.classList.contains("open")) closeModal();
    });

    loadBtn.addEventListener("click", loadImages);

    // Rubric: auto-load default 9 days; bonus: fact on every page load
    pickFact();
    initDates();
    loadImages();
  </script>
</body>
</html>
